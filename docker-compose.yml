services:
  app:
    build: .
    container_name: ai-smart-saver-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_budget_tracker
    ports:
      - "8550:8550"
    volumes:
      - ./assets:/app/assets

  api:
    build: .
    container_name: ai-smart-saver-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_budget_tracker
    command: ["uvicorn", "backend.api_server:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    profiles:
      - api

  postgres:
    image: postgres:16
    container_name: ai-smart-saver-postgres
    environment:
      POSTGRES_DB: ai_budget_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_budget_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
